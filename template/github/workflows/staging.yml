# Generated by /forge:init (§20.2 — economic CI/CD).
# The expensive pipeline runs ONCE, on promotion develop -> staging. Work branches and
# develop rely on local gates (hooks + /forge:verify) — zero Actions minutes.
name: staging-pipeline
on:
  push:
    branches: [staging]
  workflow_dispatch: {}
jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build, test, contract, scan, deploy
        run: |
          echo "Pipeline de staging — preencher conforme a stack do projeto:"
          echo "  build + suite integrada + contract tests + security scan + deploy staging"
          echo "Checks baratos rodam localmente (hooks .forge/hooks/git + /forge:verify)."
